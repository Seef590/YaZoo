services:
  app:
    image: yazoo-backend:local
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - backend/.env.docker.example
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://${LAN_HOST:-localhost}:${APP_PORT:-8000}
      APP_KEY: ${APP_KEY:?APP_KEY is required}
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE:?DB_DATABASE is required}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      FRONTEND_URL: http://${LAN_HOST:-localhost}:${FRONTEND_PORT:-4173}
      SANCTUM_STATEFUL_DOMAINS: ${LAN_HOST:-localhost}:${FRONTEND_PORT:-4173},localhost:${FRONTEND_PORT:-4173},127.0.0.1:${FRONTEND_PORT:-4173},${LAN_HOST:-localhost},localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://${LAN_HOST:-localhost}:${FRONTEND_PORT:-4173},http://localhost:${FRONTEND_PORT:-4173},http://127.0.0.1:${FRONTEND_PORT:-4173}
      SESSION_DOMAIN: ""
      SESSION_SECURE_COOKIE: "false"
      SESSION_SAME_SITE: lax
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend-storage:/var/www/html/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health/live >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  queue:
    image: yazoo-backend:local
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "redis", "--sleep=1", "--tries=3", "--backoff=5", "--timeout=90", "--memory=256"]
    env_file:
      - backend/.env.docker.example
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://${LAN_HOST:-localhost}:${APP_PORT:-8000}
      APP_KEY: ${APP_KEY:?APP_KEY is required}
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE:?DB_DATABASE is required}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      FRONTEND_URL: http://${LAN_HOST:-localhost}:${FRONTEND_PORT:-4173}
      SANCTUM_STATEFUL_DOMAINS: ${LAN_HOST:-localhost}:${FRONTEND_PORT:-4173},localhost:${FRONTEND_PORT:-4173},127.0.0.1:${FRONTEND_PORT:-4173},${LAN_HOST:-localhost},localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://${LAN_HOST:-localhost}:${FRONTEND_PORT:-4173},http://localhost:${FRONTEND_PORT:-4173},http://127.0.0.1:${FRONTEND_PORT:-4173}
      SESSION_DOMAIN: ""
      SESSION_SECURE_COOKIE: "false"
      SESSION_SAME_SITE: lax
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend-storage:/var/www/html/storage
    healthcheck:
      test: ["CMD-SHELL", "php artisan list --raw >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "0.0.0.0:${APP_PORT:-8000}:80"
    volumes:
      - ./infra/nginx/api.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/html/public:ro
      - backend-storage:/var/www/html/storage:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health/live >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "0.0.0.0:${FRONTEND_PORT:-4173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:?DB_DATABASE is required}
      MYSQL_USER: ${DB_USERNAME:?DB_USERNAME is required}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
    ports:
      - "127.0.0.1:${DB_PUBLISHED_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  sonar-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SONAR_DB_NAME:?SONAR_DB_NAME is required}
      POSTGRES_USER: ${SONAR_DB_USERNAME:?SONAR_DB_USERNAME is required}
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD:?SONAR_DB_PASSWORD is required}
    volumes:
      - sonar-db-data:/var/lib/postgresql/data

  sonarqube:
    image: sonarqube:lts-community
    restart: unless-stopped
    depends_on:
      - sonar-db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/${SONAR_DB_NAME:?SONAR_DB_NAME is required}
      SONAR_JDBC_USERNAME: ${SONAR_DB_USERNAME:?SONAR_DB_USERNAME is required}
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD:?SONAR_DB_PASSWORD is required}
    ports:
      - "127.0.0.1:${SONAR_PORT:-9000}:9000"
    volumes:
      - sonar-data:/opt/sonarqube/data
      - sonar-extensions:/opt/sonarqube/extensions
      - sonar-logs:/opt/sonarqube/logs

volumes:
  backend-storage:
  mysql-data:
  redis-data:
  sonar-db-data:
  sonar-data:
  sonar-extensions:
  sonar-logs:
