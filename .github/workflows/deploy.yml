name: Deploy YaZoo

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: bcmath, intl, mbstring, pdo_mysql, pdo_sqlite, sqlite3, mongodb, redis
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Backend dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Backend tests
        working-directory: backend
        run: php artisan test
      - name: Frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Frontend tests
        working-directory: frontend
        run: npm run test:coverage -- --run
      - name: Frontend build
        working-directory: frontend
        run: npm run build

  build-and-deploy:
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push backend image
        run: |
          docker build -f backend/Dockerfile \
            -t "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-api:${{ github.sha }}" \
            -t "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-api:latest" \
            .
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-api:${{ github.sha }}"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-api:latest"
      - name: Deploy backend App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: yazoo-api
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          images: ${{ secrets.DOCKERHUB_USERNAME }}/yazoo-api:${{ github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build and push frontend image
        run: |
          docker build -f frontend/Dockerfile \
            -t "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-frontend:${{ github.sha }}" \
            -t "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-frontend:latest" \
            .
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-frontend:${{ github.sha }}"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-frontend:latest"
      - name: Deploy frontend App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: yazoo
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          images: ${{ secrets.DOCKERHUB_USERNAME }}/yazoo-frontend:${{ github.sha }}
