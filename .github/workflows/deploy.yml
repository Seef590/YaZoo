name: Deploy YaZoo

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: bcmath, intl, mbstring, pdo_mysql, pdo_sqlite, sqlite3, mongodb, redis
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Backend dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Backend tests
        working-directory: backend
        run: php artisan test
      - name: Frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Frontend tests
        working-directory: frontend
        run: npm run test:coverage -- --run
      - name: Frontend build
        working-directory: frontend
        run: npm run build

  build-and-deploy:
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push backend image
        run: |
          docker build -f backend/Dockerfile \
            -t "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-api:${{ github.sha }}" \
            -t "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-api:latest" \
            .
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-api:${{ github.sha }}"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-api:latest"
      - name: Deploy backend App Service
        run: |
          az webapp config container set \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --container-image-name "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-api:${{ github.sha }}" \
            --container-registry-url "https://index.docker.io"
          az webapp config appsettings set \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --settings WEBSITES_PORT=8080 WEBSITES_CONTAINER_START_TIME_LIMIT=1800 WEBSITE_HEALTHCHECK_MAXPINGFAILURES=3 YAZOO_RUN_MIGRATIONS=true YAZOO_RUNTIME_OPTIMIZE=true YAZOO_IMAGE_TAG="${{ github.sha }}"
          az webapp config set \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --generic-configurations '{"healthCheckPath":"/health/ready"}'
          az webapp restart \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build and push frontend image
        run: |
          docker build -f frontend/Dockerfile \
            -t "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-frontend:${{ github.sha }}" \
            -t "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-frontend:latest" \
            .
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-frontend:${{ github.sha }}"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-frontend:latest"
      - name: Deploy frontend App Service
        run: |
          az webapp config container set \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "yazoo" \
            --container-image-name "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-frontend:${{ github.sha }}" \
            --container-registry-url "https://index.docker.io"
          az webapp config appsettings set \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "yazoo" \
            --settings WEBSITES_PORT=80 WEBSITES_CONTAINER_START_TIME_LIMIT=600 YAZOO_IMAGE_TAG="${{ github.sha }}"
          az webapp restart \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "yazoo"
