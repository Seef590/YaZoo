name: Deploy YaZoo

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: bcmath, intl, mbstring, pdo_mysql, pdo_sqlite, sqlite3, mongodb, redis
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Backend dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Backend tests
        working-directory: backend
        run: php artisan test
      - name: Frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Frontend tests
        working-directory: frontend
        run: npm run test:coverage -- --run
      - name: Frontend build
        working-directory: frontend
        run: npm run build

  build-and-deploy:
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Build and push backend image
        run: |
          az acr login --name "${{ secrets.ACR_NAME }}"
          docker build -f backend/Dockerfile -t "${{ secrets.ACR_LOGIN_SERVER }}/yazoo-api:${{ github.sha }}" .
          docker push "${{ secrets.ACR_LOGIN_SERVER }}/yazoo-api:${{ github.sha }}"
      - name: Deploy backend App Service
        run: |
          az webapp config container set \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --docker-custom-image-name "${{ secrets.ACR_LOGIN_SERVER }}/yazoo-api:${{ github.sha }}" \
            --docker-registry-server-url "https://${{ secrets.ACR_LOGIN_SERVER }}"
          az webapp config appsettings set \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --settings WEBSITES_PORT=8080 WEBSITES_CONTAINER_START_TIME_LIMIT=1800 WEBSITE_HEALTHCHECK_MAXPINGFAILURES=3 YAZOO_RUN_MIGRATIONS=true YAZOO_RUNTIME_OPTIMIZE=true YAZOO_IMAGE_TAG="${{ github.sha }}"
          az webapp config set \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --generic-configurations '{"healthCheckPath":"/health/ready"}'
          az webapp restart \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_APP_NAME: YaZoo
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_STORAGE_URL: ${{ vars.VITE_STORAGE_URL }}
          VITE_REALTIME_ENABLED: ${{ vars.VITE_REALTIME_ENABLED || 'false' }}
          VITE_REVERB_APP_KEY: ${{ vars.VITE_REVERB_APP_KEY }}
          VITE_REVERB_HOST: ${{ vars.VITE_REVERB_HOST }}
          VITE_REVERB_PORT: ${{ vars.VITE_REVERB_PORT || '443' }}
          VITE_REVERB_SCHEME: ${{ vars.VITE_REVERB_SCHEME || 'https' }}
          VITE_MONITORING_ENABLED: ${{ vars.VITE_MONITORING_ENABLED || 'false' }}
          VITE_MONITORING_ENDPOINT: ${{ vars.VITE_MONITORING_ENDPOINT }}
          VITE_NOTIFICATIONS_POLL_MS: ${{ vars.VITE_NOTIFICATIONS_POLL_MS || '30000' }}
          VITE_BUILD_SOURCEMAPS: ${{ vars.VITE_BUILD_SOURCEMAPS || 'false' }}
        run: |
          npm ci
          npm run build
      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: frontend
          skip_app_build: true
          output_location: dist
