name: Deploy YaZoo

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.scope.outputs.backend }}
      frontend: ${{ steps.scope.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect deployment scope
        id: scope
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "$BEFORE_SHA" "$CURRENT_SHA" -- \
            backend/ infra/nginx/api.conf .github/workflows/deploy.yml LICENSE .dockerignore; then
            echo "backend=false" >> "$GITHUB_OUTPUT"
          else
            echo "backend=true" >> "$GITHUB_OUTPUT"
          fi

          if git diff --quiet "$BEFORE_SHA" "$CURRENT_SHA" -- \
            frontend/ infra/nginx/frontend.conf .github/workflows/deploy.yml LICENSE .dockerignore; then
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          fi

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: bcmath, intl, mbstring, pdo_mysql, pdo_sqlite, sqlite3, mongodb, redis
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Backend dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Backend tests
        working-directory: backend
        run: php artisan test
      - name: Frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Frontend tests
        working-directory: frontend
        run: npm run test:coverage -- --run
      - name: Frontend build
        working-directory: frontend
        run: npm run build

  build-and-deploy:
    needs: [changes, tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push backend image
        if: needs.changes.outputs.backend == 'true'
        run: |
          docker build -f backend/Dockerfile \
            -t "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-api:${{ github.sha }}" \
            -t "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-api:latest" \
            .
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-api:${{ github.sha }}"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-api:latest"
      - name: Refresh backend App Service container
        if: needs.changes.outputs.backend == 'true'
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
        run: |
          python3 - <<'PY' > /tmp/backend-kudu.env
          import os
          import shlex
          import xml.etree.ElementTree as ET

          root = ET.fromstring(os.environ["PUBLISH_PROFILE"])
          profile = next(
              (item for item in root.findall("publishProfile") if item.attrib.get("publishMethod") == "ZipDeploy"),
              None,
          )
          if profile is None:
              raise SystemExit("ZipDeploy publish profile not found")

          print(f"SCM_USER={shlex.quote(profile.attrib['userName'])}")
          print(f"SCM_PASS={shlex.quote(profile.attrib['userPWD'])}")
          PY
          . /tmp/backend-kudu.env
          curl --fail --silent --show-error --output /dev/null --write-out "Backend hook HTTP %{http_code}\n" \
            -X POST \
            -u "$SCM_USER:$SCM_PASS" \
            "https://yazoo-api.scm.azurewebsites.net/docker/hook"
      - uses: actions/setup-node@v4
        if: needs.changes.outputs.frontend == 'true'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build and push frontend image
        if: needs.changes.outputs.frontend == 'true'
        run: |
          docker build -f frontend/Dockerfile \
            -t "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-frontend:${{ github.sha }}" \
            -t "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-frontend:latest" \
            .
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-frontend:${{ github.sha }}"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/yazoo-frontend:latest"
      - name: Refresh frontend App Service container
        if: needs.changes.outputs.frontend == 'true'
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
        run: |
          python3 - <<'PY' > /tmp/frontend-kudu.env
          import os
          import shlex
          import xml.etree.ElementTree as ET

          root = ET.fromstring(os.environ["PUBLISH_PROFILE"])
          profile = next(
              (item for item in root.findall("publishProfile") if item.attrib.get("publishMethod") == "ZipDeploy"),
              None,
          )
          if profile is None:
              raise SystemExit("ZipDeploy publish profile not found")

          print(f"SCM_USER={shlex.quote(profile.attrib['userName'])}")
          print(f"SCM_PASS={shlex.quote(profile.attrib['userPWD'])}")
          PY
          . /tmp/frontend-kudu.env
          curl --fail --silent --show-error --output /dev/null --write-out "Frontend hook HTTP %{http_code}\n" \
            -X POST \
            -u "$SCM_USER:$SCM_PASS" \
            "https://yazoo.scm.azurewebsites.net/docker/hook"
