limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=120r/m;

server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $php_upstream app:9000;

    client_max_body_size 20m;
    limit_req_status 429;

    access_log /dev/stdout;
    error_log /dev/stderr warn;

    add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' https: wss:; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:" always;

    location /up {
        try_files $uri /index.php?$query_string;
    }

    location /health/live {
        try_files $uri /index.php?$query_string;
    }

    location /health/ready {
        try_files $uri /index.php?$query_string;
    }

    location /api {
        limit_req zone=api_per_ip burst=120 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /storage/ {
        alias /var/www/html/storage/app/public/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
        try_files $uri =404;
    }

    location ~ \.php$ {
        fastcgi_pass $php_upstream;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
