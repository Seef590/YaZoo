sonar.projectKey=yazoo
sonar.projectName=YaZoo
sonar.sourceEncoding=UTF-8
sonar.sources=backend/app,backend/routes,frontend/src
sonar.tests=backend/tests,frontend/src
sonar.exclusions=**/vendor/**,**/node_modules/**,**/coverage/**,**/storage/**,**/bootstrap/cache/**
sonar.test.inclusions=backend/tests/**/*.php,frontend/src/**/*.test.jsx,frontend/src/**/*.test.js
sonar.php.coverage.reportPaths=backend/coverage/clover.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.cpd.exclusions=frontend/src/lib/i18n.js,**/*.test.jsx,**/*.test.js
sonar.coverage.exclusions=frontend/src/lib/i18n.js,frontend/src/main.jsx,frontend/src/**/index.js,**/*.test.jsx,**/*.test.js,backend/routes/**
sonar.typescript.tsconfigPaths=frontend/tsconfig.sonar.json
