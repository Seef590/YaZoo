server {
    listen 8080;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 64m;

    access_log /dev/stdout;
    error_log /dev/stderr warn;

    add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; img-src 'self' https://yazoo.azurewebsites.net data: blob:; media-src 'self' https://yazoo.azurewebsites.net blob:; connect-src 'self' https: wss:; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /health/live {
        try_files $uri /index.php?$query_string;
    }

    location /health/ready {
        try_files $uri /index.php?$query_string;
    }

    location /storage/ {
        alias /var/www/html/storage/app/public/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
        try_files $uri =404;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
